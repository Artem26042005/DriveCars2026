<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drive Cars Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="tabs">
        <button onclick="showTab('usa')" class="active">USA</button>
        <button onclick="showTab('eu')">EUROPE</button>
    </div>

    <!-- USA -->
    <div id="usa" class="tab active">
        <input type="number" id="priceUSA" placeholder="Ціна авто">
        <input type="number" id="engineUSA" placeholder="Обʼєм двигуна">
        <input type="number" id="yearUSA" placeholder="Рік">

        <button onclick="calcUSA()">РОЗРАХУВАТИ</button>

        <div class="result">
            <div class="title">Кінцева вартість</div>
            <div id="totalUSA" class="price">0 $</div>

            <div class="payment">
                Оплатити протягом 3-х днів:
                <span id="payUSA">0 $</span>
            </div>
        </div>
    </div>

    <!-- EUROPE -->
    <div id="eu" class="tab">
        <input type="number" id="priceEU" placeholder="Ціна авто">
        <input type="number" id="deliveryEU" placeholder="Доставка по Європі">
        <input type="number" id="engineEU" placeholder="Обʼєм двигуна">
        <input type="number" id="yearEU" placeholder="Рік">

        <button onclick="calcEU()">РОЗРАХУВАТИ</button>

        <div class="result">
            <div class="title">Кінцева вартість</div>
            <div id="totalEU" class="price">0 €</div>

            <div class="payment">
                Оплатити протягом 3-х днів:
                <span id="payEU">0 €</span>
            </div>
        </div>
    </div>

</div>

<script src="script.js?v=2"></script>

</body>
</html>
